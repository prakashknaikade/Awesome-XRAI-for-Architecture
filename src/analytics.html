<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XRAI4AEC Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0f1115; color:#e6edf3; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .back { color:#e6edf3; text-decoration:none; border:1px solid #30363d; padding:8px 12px; border-radius:8px; }
    .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:12px; }
    .kpi { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; }
    @media (max-width: 900px){ .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Analytics</h1>
      <a class="back" href="./index.html">Back to Papers</a>
    </div>

    <div class="kpis">
      <div class="kpi">Total Papers: <strong id="kTotal">0</strong></div>
      <div class="kpi">Primary Categories: <strong id="kCats">0</strong></div>
      <div class="kpi">Unique Tags: <strong id="kTags">0</strong></div>
      <div class="kpi">Years Covered: <strong id="kYears">-</strong></div>
    </div>

    <div class="grid">
      <div class="card"><h3>Primary Category Share</h3><canvas id="cPie"></canvas></div>
      <div class="card"><h3>Year-wise (2020–2025)</h3><canvas id="cYearBar"></canvas></div>
      <div class="card"><h3>Top Tags</h3><canvas id="cTagBar"></canvas></div>
      <div class="card"><h3>All Years Trend</h3><canvas id="cYearLine"></canvas></div>
    </div>
  </div>

  <script>
    const count = (arr) => arr.reduce((m, x) => (m.set(x, (m.get(x)||0)+1), m), new Map());
    const entriesDesc = (m) => [...m.entries()].sort((a,b)=>b[1]-a[1] || String(a[0]).localeCompare(String(b[0])));

    fetch('./papers_data.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        const years = data.map(d => Number(d.year)).filter(Boolean);
        const cats = data.map(d => d.primary_category || 'Uncategorized');
        const tags = data.flatMap(d => d.tags || []).filter(Boolean);

        const cm = count(cats), ym = count(years), tm = count(tags);

        document.getElementById('kTotal').textContent = data.length;
        document.getElementById('kCats').textContent = cm.size;
        document.getElementById('kTags').textContent = tm.size;
        document.getElementById('kYears').textContent = years.length ? `${Math.min(...years)}–${Math.max(...years)}` : '-';

        const cE = entriesDesc(cm);
        new Chart(document.getElementById('cPie'), {
          type: 'pie',
          data: { labels: cE.map(x=>x[0]), datasets: [{ data: cE.map(x=>x[1]) }] }
        });

        const yRange = [2020,2021,2022,2023,2024,2025];
        new Chart(document.getElementById('cYearBar'), {
          type: 'bar',
          data: { labels: yRange, datasets: [{ label:'Papers', data: yRange.map(y => ym.get(y) || 0) }] },
          options: { scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
        });

        const tE = entriesDesc(tm).slice(0, 15);
        new Chart(document.getElementById('cTagBar'), {
          type: 'bar',
          data: { labels: tE.map(x=>x[0]), datasets: [{ label:'Count', data: tE.map(x=>x[1]) }] },
          options: { indexAxis:'y', scales:{ x:{ beginAtZero:true, ticks:{ precision:0 } } } }
        });

        const yE = [...ym.entries()].sort((a,b)=>a[0]-b[0]);
        new Chart(document.getElementById('cYearLine'), {
          type: 'line',
          data: { labels: yE.map(x=>x[0]), datasets: [{ label:'Papers', data: yE.map(x=>x[1]), tension:0.25 }] },
          options: { scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
        });
      });
  </script>
</body>
</html>
